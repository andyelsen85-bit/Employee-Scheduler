    # EMPLOYEE
    Employee:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        country:
          type: string
          description: "lu | be | de | fr | other"
        contractPercent:
          type: number
          description: "e.g. 100, 80, 50"
        weeklyContractHours:
          type: number
          description: "Contracted hours per week"
        homeworkEligible:
          type: boolean
        coworkEligible:
          type: boolean
        allowedShiftCodes:
          type: array
          items:
            type: string
          description: "Which codes this employee accepts"
        permanenceGroup:
          type: integer
          nullable: true
          description: "1 or 2, null if not in a permanence group"
        permanenceLevel:
          type: integer
          nullable: true
          description: "1 (primary) or 2 (escalation)"
        isSpoc:
          type: boolean
        spocRotates:
          type: boolean
        isManagement:
          type: boolean
        prmCounter:
          type: number
          description: "Running PRM balance in hours"
        holidayHoursRemaining:
          type: number
          description: "Remaining holiday hours"
        overtimeHours:
          type: number
        homeworkDaysUsedThisYear:
          type: integer
          description: "TT days used — relevant for cross-border workers (max 35/year)"
        dayCodePreferences:
          type: array
          nullable: true
          items:
            type: object
            properties:
              day:
                type: integer
                description: "0=Mon, 1=Tue, 2=Wed, 3=Thu, 4=Fri"
              code:
                type: string
            required: [day, code]
          description: "Favourite shift codes per weekday used by the auto-planner"
        prefersHeightAdjustableDesk:
          type: boolean
          nullable: true
          description: "Whether the employee prefers a height-adjustable desk"
        departmentId:
          type: integer
          nullable: true
          description: "ID of the department this employee belongs to"
        preferredOfficeId:
          type: integer
          nullable: true
          description: "ID of the office this employee prefers to work from (used by the auto-planner)"
        onsiteWeekRatio:
          type: number
          nullable: true
          description: "Custom onsite week ratio for the auto-planner (e.g. 0.5 = 50%). Null uses the default formula (floor(weeks/2))."
        displayOrder:
          type: integer
          description: "Manual sort order for the planning view. Lower numbers appear first within a department group."
        role:
          type: string
          nullable: true
          description: "Employee organisational role (e.g. analyst, manager, team lead)"
        email:
          type: string
          nullable: true
          description: "Employee email address (used for demand notifications)"
        approverAdminId:
          type: integer
          nullable: true
          description: "ID of the admin user who approves demands for this employee"
        notes:
          type: string
          nullable: true
        holidayBalances:
          type: array
          items:
            $ref: "#/components/schemas/EmployeeHolidayBalance"
          description: "Per-code balances for holiday-type shift codes (excluding C0)"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - country
        - contractPercent
        - weeklyContractHours
        - homeworkEligible
        - coworkEligible
        - allowedShiftCodes
        - isSpoc
        - spocRotates
        - isManagement
        - prmCounter
        - holidayHoursRemaining
        - overtimeHours
        - homeworkDaysUsedThisYear
        - displayOrder
        - holidayBalances
        - createdAt
        - updatedAt

    CreateEmployeeBody:
      type: object
      properties:
        name:
          type: string
        country:
          type: string
        contractPercent:
          type: number
        weeklyContractHours:
          type: number
        homeworkEligible:
          type: boolean
        coworkEligible:
          type: boolean
        allowedShiftCodes:
          type: array
          items:
            type: string
        permanenceGroup:
          type: integer
          nullable: true
        permanenceLevel:
          type: integer
          nullable: true
        isSpoc:
