          type: string
          description: "missing_spoc | missing_management | missing_perma1 | missing_perma2 | desk_overflow | prm_exceeded | homework_limit | insufficient_onsite | role_gap"
        message:
          type: string
        employeeId:
          type: integer
          nullable: true
      required: [date, type, message]

