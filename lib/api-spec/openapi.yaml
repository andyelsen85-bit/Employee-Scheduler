          type: integer
        employeeId:
          type: integer
        date:
          type: string
        shiftCode:
          type: string
          nullable: true
        deskCode:
          type: string
          nullable: true
          description: "Randomly assigned shared desk for onsite days"
        isPermanence:
          type: boolean
        permanenceLevel:
          type: integer
          nullable: true
        isLocked:
          type: boolean
          description: "True when manually set or confirmed"
        requestedOff:
          type: boolean
        notes:
          type: string
          nullable: true
        isFromPrevMonth:
          type: boolean
          description: "True for entries fetched from the previous month's plan (overflow display only — excluded from this month's hour totals)"
      required: [id, employeeId, date, isPermanence, isLocked, requestedOff, isFromPrevMonth]

    MonthPlanning:
      type: object
      properties:
        year:
          type: integer
        month:
          type: integer
        status:
          type: string
          description: "draft | confirmed"
        entries:
          type: array
          items:
            $ref: "#/components/schemas/PlanningEntry"
        violations:
          type: array
          items:
            $ref: "#/components/schemas/PlanningViolation"
        generatedAt:
          type: string
          format: date-time
          nullable: true
        negativeBalanceEmployees:
          type: array
          nullable: true
          description: "Populated after confirmation — employees whose holiday balance went negative"
          items:
            type: object
            properties:
              employeeId:
                type: integer
              name:
                type: string
            required: [employeeId, name]
      required: [year, month, status, entries, violations]

