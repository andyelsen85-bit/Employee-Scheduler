        planningStatus:
          type: string
        employeeStats:
          type: array
          items:
            $ref: "#/components/schemas/EmployeeStatSummary"
        dailyOnsiteRate:
          type: array
          items:
            $ref: "#/components/schemas/DailyOnsiteRate"
        permanenceSchedule:
