openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: HR Planner API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: departments
  - name: employees
  - name: offices
  - name: shiftCodes
  - name: templates
  - name: monthlyConfig
  - name: holidays
  - name: planning
  - name: dashboard
  - name: demands
  - name: mailSettings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── DEPARTMENTS ────────────────────────────────────────────────────────────
  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List all departments
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create a department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepartmentBody"
      responses:
        "201":
          description: Created department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /departments/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    put:
      operationId: updateDepartment
      tags: [departments]
      summary: Update a department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDepartmentBody"
      responses:
        "200":
          description: Updated department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
    delete:
      operationId: deleteDepartment
      tags: [departments]
      summary: Delete a department
      responses:
        "204":
          description: Deleted

  # ── EMPLOYEES ──────────────────────────────────────────────────────────────
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List all employees
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create an employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    put:
      operationId: updateEmployee
      tags: [employees]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: deleteEmployee
      tags: [employees]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /employees/{id}/counters:
    put:
      operationId: updateEmployeeCounters
      tags: [employees]
      summary: Update an employee's running counters
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCountersBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  # ── OFFICES ────────────────────────────────────────────────────────────────
  /offices:
    get:
      operationId: listOffices
      tags: [offices]
      summary: List all offices with their employee assignments
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Office"
    post:
      operationId: createOffice
      tags: [offices]
      summary: Create an office
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOfficeBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Office"

  /offices/{id}:
    put:
      operationId: updateOffice
      tags: [offices]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOfficeBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Office"
    delete:
      operationId: deleteOffice
      tags: [offices]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /offices/{id}/employees:
    put:
      operationId: updateOfficeEmployees
      tags: [offices]
      summary: Set which employees are eligible for this office
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOfficeEmployeesBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Office"

  # ── SHIFT CODES ────────────────────────────────────────────────────────────
  /shift-codes:
    get:
      operationId: listShiftCodes
      tags: [shiftCodes]
      summary: List all shift codes
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShiftCode"
    post:
      operationId: createShiftCode
      tags: [shiftCodes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShiftCodeBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShiftCode"

  /shift-codes/{code}:
    put:
      operationId: updateShiftCode
      tags: [shiftCodes]
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShiftCodeBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShiftCode"
    delete:
      operationId: deleteShiftCode
      tags: [shiftCodes]
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ── WEEK TEMPLATES ─────────────────────────────────────────────────────────
  /employees/{id}/templates:
    get:
      operationId: listEmployeeTemplates
      tags: [templates]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeekTemplate"
    post:
      operationId: createWeekTemplate
      tags: [templates]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWeekTemplateBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeekTemplate"

  /templates/{id}:
    put:
      operationId: updateWeekTemplate
      tags: [templates]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWeekTemplateBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeekTemplate"
    delete:
      operationId: deleteWeekTemplate
      tags: [templates]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── MONTHLY CONFIG ─────────────────────────────────────────────────────────
  /monthly-configs:
    get:
      operationId: listMonthlyConfigs
      tags: [monthlyConfig]
      summary: List all monthly configurations
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyConfig"

  /monthly-configs/{year}/{month}:
    get:
      operationId: getMonthlyConfig
      tags: [monthlyConfig]
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyConfig"
    put:
      operationId: upsertMonthlyConfig
      tags: [monthlyConfig]
      summary: Create or update monthly configuration
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertMonthlyConfigBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyConfig"

  # ── PUBLIC HOLIDAYS ────────────────────────────────────────────────────────
  /holidays:
    get:
      operationId: listHolidays
      tags: [holidays]
      parameters:
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicHoliday"
    post:
      operationId: createHoliday
      tags: [holidays]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHolidayBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicHoliday"

  /holidays/{id}:
    put:
      operationId: updateHoliday
      tags: [holidays]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHolidayBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicHoliday"
    delete:
      operationId: deleteHoliday
      tags: [holidays]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── PLANNING ───────────────────────────────────────────────────────────────
  /planning/{year}/{month}:
    get:
      operationId: getMonthPlanning
      tags: [planning]
      summary: Get the full planning for a month (all employees × all days)
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthPlanning"

  /planning/{year}/{month}/generate:
    post:
      operationId: generatePlanning
      tags: [planning]
      summary: Generate a planning proposal for a month
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePlanningBody"
      responses:
        "200":
          description: Planning generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthPlanning"

  /planning/{year}/{month}/generate/employee/{employeeId}:
    post:
      operationId: generateEmployeePlanning
      tags: [planning]
      summary: Regenerate planning for a single employee, preserving all other employees' entries
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: path
          required: true
          schema:
            type: integer
        - name: employeeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePlanningBody"
      responses:
        "200":
          description: Planning updated for employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthPlanning"

  /planning/{year}/{month}/confirm:
    post:
      operationId: confirmPlanning
      tags: [planning]
      summary: Confirm the planning for a month and update all counters
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthPlanning"

  /planning/{year}/{month}/entries:
    post:
      operationId: createPlanningEntry
      tags: [planning]
      summary: Create or update a single locked planning entry (upsert by employee+date)
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlanningEntryBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanningEntry"

  /planning/entries/{id}:
    put:
      operationId: updatePlanningEntry
      tags: [planning]
      summary: Manually update a single planning entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlanningEntryBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanningEntry"

  # ── DASHBOARD ──────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Overview stats — counters, homework usage, on-site rate, permanence schedule
      parameters:
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ── AUTH ─────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in and create a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Authenticated user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Destroy the current session
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  # ── USERS (admin only) ───────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all system users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SystemUser"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemUser"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemUser"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── DEMANDS ──────────────────────────────────────────────────────────────
  /demands:
    get:
      operationId: listDemands
      tags: [demands]
      summary: List shift demands for a given month
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of demands with decisions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DemandWithDecision"
    post:
      operationId: createDemand
      tags: [demands]
      summary: Create or update a shift demand
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDemandBody"
      responses:
        "201":
          description: Created/updated demand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Demand"
        "400":
          description: Validation error (past month, locked month, locked day)

  /demands/{id}:
    delete:
      operationId: deleteDemand
      tags: [demands]
      summary: Delete a demand
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /demands/{id}/decision:
    patch:
      operationId: decideDemand
      tags: [demands]
      summary: Approve or reject a demand (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DemandDecisionBody"
      responses:
        "200":
          description: Updated demand and decision record
          content:
            application/json:
              schema:
                type: object
                properties:
                  demand:
                    $ref: "#/components/schemas/Demand"
                  decision:
                    $ref: "#/components/schemas/DemandDecision"

  # ── MAIL SETTINGS (admin only) ───────────────────────────────────────────
  /settings/mail:
    get:
      operationId: getMailSettings
      tags: [mailSettings]
      summary: Get SMTP mail settings (admin only)
      responses:
        "200":
          description: Mail settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailSettings"
    put:
      operationId: updateMailSettings
      tags: [mailSettings]
      summary: Update SMTP mail settings (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MailSettings"
      responses:
        "200":
          description: Updated mail settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailSettings"

  /settings/mail/test:
    post:
      operationId: testMailSettings
      tags: [mailSettings]
      summary: Send a test email (admin only)
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

# ── COMPONENTS ──────────────────────────────────────────────────────────────
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # AUTH
    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
        employeeId:
          type: integer
          nullable: true
      required: [id, username, role]

    # USERS
    SystemUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
        employeeId:
          type: integer
          nullable: true
        isLegacy:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, username, role, isLegacy, createdAt]

    CreateUserBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, user]
        employeeId:
          type: integer
          nullable: true
      required: [username, password, role]

    UpdateUserBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, user]
        employeeId:
          type: integer
          nullable: true

    # DEMANDS
    Demand:
      type: object
      properties:
        id:
          type: integer
        employeeId:
          type: integer
        year:
          type: integer
        month:
          type: integer
        day:
          type: integer
        demandCode:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        notifiedAt:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, employeeId, year, month, day, demandCode, status]

    DemandDecision:
      type: object
      properties:
        id:
          type: integer
        demandId:
